<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Analyzer</title>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <link rel="icon" href="favicon.svg" type="image/png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="favicon.svg">

    <link rel="stylesheet" href="./styles/style.css">
</head>

<body>

    <div class="app-container">
        <div id="eval-bar-container">
            <div id="eval-score">0.0</div>
            <div id="eval-fill"></div>
        </div>

        <div id="board-container">
            <div id="board-wrapper">
                <div id="board"></div>
                <div id="board-selected-player-label" class="board-player-label"></div>
            </div>
        </div>
    </div>

    <div id="player-choice-panel" class="player-choice-panel" style="display: none;">
        <p class="player-choice-title">Analyze moves for which player?</p>
        <div class="player-choice-buttons">
            <button type="button" id="btnAnalyzeWhite" class="player-choice-btn">White</button>
            <button type="button" id="btnAnalyzeBlack" class="player-choice-btn">Black</button>
        </div>
    </div>

    <div class="coach-panel">

        <div class="coach-bubble">
            <div class="coach-avatar">🤖</div>
            <div class="coach-content">
                <span id="coach-title">I'm ready!</span>
                <span id="coach-text">Load a PGN game to start your lesson.</span>
            </div>
        </div>

        <div class="controls">
            <button id="btnPrev" class="secondary">◀ Back</button>
            <button id="btnNext" class="primary">Next Move ▶</button>
        </div>

        <div class="setup-toggle" id="toggle-setup">Paste PGN Game 👇</div>
        <div id="setup-area">
            <textarea id="pgnInput" placeholder='[Event "My Game"]...'></textarea>
            <button id="btnLoad">Analyze Game</button>
        </div>
    </div>

    <script type="module" src="./scripts/main.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js');
        }
    </script>

</body>

</html>
